<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nurse Intake Assistant Demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7faf9;
        --panel: #ffffff;
        --ink: #182322;
        --muted: #566967;
        --accent: #0f766e;
        --accent-dark: #115e59;
        --line: #d8e4e1;
        --warn: #7c2d12;
        --warn-bg: #fff7ed;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        line-height: 1.5;
      }

      main {
        width: min(1100px, 100%);
        margin: 0 auto;
        padding: 20px;
      }

      header {
        display: grid;
        gap: 12px;
        padding: 10px 0 18px;
      }

      h1,
      h2 {
        margin: 0;
        line-height: 1.15;
      }

      h1 {
        font-size: clamp(2rem, 7vw, 4rem);
      }

      h2 {
        font-size: 1.05rem;
      }

      p {
        margin: 0;
      }

      .disclaimer {
        border: 1px solid #fed7aa;
        border-radius: 8px;
        background: var(--warn-bg);
        color: var(--warn);
        padding: 12px;
        font-weight: 650;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
        gap: 16px;
      }

      section {
        display: grid;
        gap: 12px;
        min-width: 0;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 650;
      }

      textarea,
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
        color: var(--ink);
        font: inherit;
      }

      textarea {
        min-height: 150px;
        resize: vertical;
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        padding: 10px 14px;
        font: inherit;
        font-weight: 750;
        cursor: pointer;
      }

      button.secondary {
        border: 1px solid var(--line);
        background: #ffffff;
        color: var(--accent-dark);
      }

      button.danger {
        background: #b42318;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .result,
      .case-list,
      .summary {
        display: grid;
        gap: 8px;
      }

      .facts {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .fact {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
      }

      .fact span,
      .muted {
        color: var(--muted);
        font-size: 0.88rem;
      }

      .case-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
      }

      code {
        overflow-wrap: anywhere;
      }

      pre {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #f9fbfb;
        padding: 10px;
        white-space: pre-wrap;
      }

      @media (max-width: 760px) {
        main {
          padding: 14px;
        }

        .grid,
        .facts {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Nurse Intake Assistant</h1>
        <p class="muted">Local demo intake assistant using mock-safe backend services.</p>
        <p class="disclaimer">
          This demo intake assistant is not medical advice, not for emergencies,
          and AI output requires nurse review before clinical use.
        </p>
      </header>

      <div class="grid">
        <section class="panel" aria-labelledby="intake-heading">
          <h2 id="intake-heading">Text Intake</h2>
          <label>
            Intake text
            <textarea id="intakeText">My name is Jane Doe. DOB: 1980-04-15. My callback number is +1 (555) 555-0123. I need a medication refill.</textarea>
          </label>
          <div class="actions">
            <button id="submitIntake" type="button">Submit Intake</button>
            <button id="loadSummary" type="button" class="secondary">Load Summary</button>
            <button id="loadCases" type="button" class="secondary">Load Recent Cases</button>
            <button id="resetDemo" type="button" class="danger">Reset Demo</button>
          </div>
          <p id="status" class="muted" role="status"></p>
          <div id="createdCase" class="result"></div>
        </section>

        <section class="panel" aria-labelledby="review-heading">
          <h2 id="review-heading">Nurse Review</h2>
          <label>
            Selected case id
            <input id="selectedCaseId" autocomplete="off" />
          </label>
          <label>
            Reviewed by
            <input id="reviewedBy" value="Demo Nurse" autocomplete="name" />
          </label>
          <label>
            Review notes
            <textarea id="reviewNotes" placeholder="Optional notes"></textarea>
          </label>
          <button id="reviewCase" type="button">Mark Reviewed</button>
          <div id="reviewResult" class="result"></div>
        </section>
      </div>

      <section class="panel" aria-labelledby="queue-heading">
        <h2 id="queue-heading">Queue</h2>
        <div id="summary" class="summary"></div>
        <div id="cases" class="case-list"></div>
      </section>
    </main>

    <script>
      const status = document.querySelector("#status");
      const createdCase = document.querySelector("#createdCase");
      const summary = document.querySelector("#summary");
      const cases = document.querySelector("#cases");
      const reviewResult = document.querySelector("#reviewResult");
      const selectedCaseId = document.querySelector("#selectedCaseId");

      async function requestJson(url, options = {}) {
        const response = await fetch(url, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || `Request failed: ${response.status}`);
        }
        return data;
      }

      function setBusy(button, busy) {
        button.disabled = busy;
      }

      function showCase(target, item) {
        selectedCaseId.value = item.id;
        target.innerHTML = `
          <div class="facts">
            <div class="fact"><span>Case id</span><br /><code>${item.id}</code></div>
            <div class="fact"><span>Urgency</span><br />${item.urgency}</div>
            <div class="fact"><span>intakeComplete</span><br />${item.intakeComplete}</div>
            <div class="fact"><span>reviewStatus</span><br />${item.reviewStatus}</div>
            <div class="fact"><span>notificationEmailStatus</span><br />${item.notificationEmailStatus}</div>
            <div class="fact"><span>notificationSmsStatus</span><br />${item.notificationSmsStatus}</div>
          </div>
          <p><strong>Summary:</strong> ${item.summary || "No summary returned."}</p>
        `;
      }

      document.querySelector("#submitIntake").addEventListener("click", async (event) => {
        const button = event.currentTarget;
        setBusy(button, true);
        status.textContent = "Submitting intake...";
        try {
          const item = await requestJson("/intake/text", {
            method: "POST",
            body: JSON.stringify({
              text: document.querySelector("#intakeText").value,
              sourceSystem: "local-demo-ui",
            }),
          });
          status.textContent = "Created case.";
          showCase(createdCase, item);
          await loadSummary();
          await loadCases();
        } catch (error) {
          status.textContent = error.message;
        } finally {
          setBusy(button, false);
        }
      });

      async function loadSummary() {
        const data = await requestJson("/cases/summary");
        summary.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
      }

      async function loadCases() {
        const data = await requestJson("/cases?limit=10");
        cases.innerHTML = data
          .map(
            (item) => `
              <div class="case-row">
                <div>
                  <strong>${item.urgency}</strong> · ${item.reviewStatus}<br />
                  <span class="muted"><code>${item.id}</code></span><br />
                  ${item.summary || "No summary returned."}
                </div>
                <button type="button" class="secondary" data-case-id="${item.id}">Select</button>
              </div>
            `,
          )
          .join("") || '<p class="muted">No cases yet.</p>';
      }

      document.querySelector("#loadSummary").addEventListener("click", async () => {
        status.textContent = "Loading queue summary...";
        try {
          await loadSummary();
          status.textContent = "Loaded queue summary.";
        } catch (error) {
          status.textContent = error.message;
        }
      });

      document.querySelector("#loadCases").addEventListener("click", async () => {
        status.textContent = "Loading recent cases...";
        try {
          await loadCases();
          status.textContent = "Loaded recent cases.";
        } catch (error) {
          status.textContent = error.message;
        }
      });

      cases.addEventListener("click", (event) => {
        const button = event.target.closest("[data-case-id]");
        if (button) {
          selectedCaseId.value = button.dataset.caseId;
        }
      });

      document.querySelector("#reviewCase").addEventListener("click", async (event) => {
        const button = event.currentTarget;
        const caseId = selectedCaseId.value.trim();
        if (!caseId) {
          reviewResult.textContent = "Select or enter a case id first.";
          return;
        }

        setBusy(button, true);
        reviewResult.textContent = "Saving review...";
        try {
          const item = await requestJson(`/cases/${encodeURIComponent(caseId)}/review`, {
            method: "POST",
            body: JSON.stringify({
              reviewedBy: document.querySelector("#reviewedBy").value,
              reviewNotes: document.querySelector("#reviewNotes").value || null,
            }),
          });
          showCase(reviewResult, item);
          await loadSummary();
          await loadCases();
        } catch (error) {
          reviewResult.textContent = error.message;
        } finally {
          setBusy(button, false);
        }
      });

      document.querySelector("#resetDemo").addEventListener("click", async () => {
        status.textContent = "Resetting local mock demo...";
        try {
          await requestJson("/demo/reset", { method: "POST" });
          createdCase.innerHTML = "";
          reviewResult.innerHTML = "";
          selectedCaseId.value = "";
          await loadSummary();
          await loadCases();
          status.textContent = "Local mock demo reset.";
        } catch (error) {
          status.textContent = error.message;
        }
      });

      loadSummary().catch(() => {});
      loadCases().catch(() => {});
    </script>
  </body>
</html>
